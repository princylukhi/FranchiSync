<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>

    <title>Company Registration | FranchiSync</title>

    <!-- CSS -->
    <h:outputStylesheet library="css" name="style.css"/>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"/>

    <!-- PrimeIcons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/primeicons/7.0.0/primeicons.min.css"/>

</h:head>

<h:body>

    <!-- PAGE -->

    <div class="register-page">

        <div class="register-card">

            <!-- HEADER -->

            <div class="register-header">

                <i class="pi pi-building"></i>

                <h2>FranchiSync</h2>

                <p>Company Registration Request</p>

            </div>

            <!-- FORM -->

            <h:form>

                <p:messages showDetail="true"
                            closable="true"/>

                <!-- Company Name -->

                <div class="field">

                    <label>Company Name</label>

                    <p:inputText
                        value="#{companyBean.request.companyName}"
                        styleClass="w-100"
                        required="true"/>

                </div>

                <!-- Contact Person -->

                <div class="field mt-3">

                    <label>Contact Person</label>

                    <p:inputText
                        value="#{companyBean.request.contactPerson}"
                        styleClass="w-100"
                        required="true"/>

                </div>

                <!-- Email -->

                <div class="field mt-3">

                    <label>Email</label>

                    <p:inputText
                        value="#{companyBean.request.email}"
                        styleClass="w-100"
                        required="true"/>

                </div>

                <!-- Phone -->

                <div class="field mt-3">

                    <label>Phone</label>

                    <p:inputText
                        value="#{companyBean.request.phone}"
                        styleClass="w-100"
                        required="true"/>

                </div>

                <!-- Business Type -->

                <div class="field mt-3">

                    <label>Business Type</label>

                    <p:inputText
                        value="#{companyBean.request.businessType}"
                        styleClass="w-100"
                        required="true"/>

                </div>

                <!-- City -->

                <div class="field mt-3">

                    <label>City</label>

                    <p:inputText
                        value="#{companyBean.request.city}"
                        styleClass="w-100"
                        required="true"/>

                </div>

                <!-- BUTTON -->

                <div class="mt-4">

                    <p:commandButton
                        value="Submit Registration"
                        icon="pi pi-check"
                        action="#{companyBean.submitRequest()}"
                        ajax="false"
                        styleClass="register-btn w-100"/>

                </div>

            </h:form>

            <!-- FOOTER -->

            <div class="register-footer">

                <h:link outcome="/login.xhtml"
                        value="Back to Login"/>

            </div>

        </div>

    </div>

</h:body>
</html>
