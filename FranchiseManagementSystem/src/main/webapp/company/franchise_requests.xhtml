<!DOCTYPE html>

<ui:composition
    template="/templates/layout.xhtml"

    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="jakarta.faces.html"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:p="http://primefaces.org/ui"
    xmlns:f="jakarta.faces.core">

    <ui:define name="content">

        <h:form id="requestForm">

            <!-- PAGE HEADER -->

            <div class="mb-8">

                <h1 class="text-4xl
                           font-black
                           text-slate-900">

                    Franchise Requests

                </h1>

                <p class="text-slate-500
                          text-xl
                          mt-2">

                    Manage incoming franchise applications.

                </p>

            </div>

            <!-- TABLE CARD -->

            <div class="bg-white
                        rounded-[30px]
                        shadow-lg
                        p-6">

              <p:dataTable
                  id="requestTable"
                value="#{companyFranchiseBean.pendingRequests}"
                var="r"

                reflow="true"

                emptyMessage="No franchise requests found."

                tableStyle="min-width:1400px"

                styleClass="
                    rounded-2xl
                    overflow-hidden
                    border-0
                    shadow-sm">

                    <!-- NAME -->

                    <p:column
                        headerText="Owner Name">

                        <div class="font-semibold
                                    text-slate-700">

                            #{r.ownerName}

                        </div>

                    </p:column>

                    <!-- EMAIL -->

                    <p:column
                        headerText="Email">

                        <div class="text-slate-600">

                            #{r.email}

                        </div>

                    </p:column>

                    <!-- PHONE -->

                    <p:column
                        headerText="Phone">

                        <div class="text-slate-600">

                            #{r.phone}

                        </div>

                    </p:column>

                    <!-- STATUS -->

                    <p:column
                        headerText="Status">

                        <span class="
                            #{r.status eq 'PENDING'
                            ? 'bg-yellow-100 text-yellow-700'
                            : r.status eq 'APPROVED'
                            ? 'bg-emerald-100 text-emerald-700'
                            : 'bg-red-100 text-red-700'}

                            px-4
                            py-2
                            rounded-full
                            text-sm
                            font-bold">

                            #{r.status}

                        </span>

                    </p:column>

                    <!-- DATE -->

                    <p:column
                        headerText="Request Date">

                        <div class="text-slate-600">

                            <h:outputText value="#{r.requestDate}">
    
                                <f:convertDateTime pattern="dd MMM yyyy" timeZone="Asia/Kolkata"/>

                            </h:outputText>

                        </div>

                    </p:column>

                    <!-- ACTIONS -->

                    <p:column
                        headerText="Actions">

                        <div class="flex gap-2">

                            <!-- APPROVE -->

                            <p:commandButton
                                icon="pi pi-check"

                                action="#{companyFranchiseBean.approve(r.frid)}"

                                update="requestTable"
                                
                                process="@this"

                                rendered="#{r.status eq 'PENDING'}"

                                styleClass="
                                    !bg-emerald-500
                                    hover:!bg-emerald-600
                                    !border-0
                                    !w-11
                                    !h-11
                                    !rounded-xl"/>

                            <!-- REJECT -->

                            <p:commandButton
                                icon="pi pi-times"

                                action="#{companyFranchiseBean.reject(r.frid)}"

                                
                                update="requestTable"
                                
                                process="@this"

                                rendered="#{r.status eq 'PENDING'}"

                                styleClass="
                                    !bg-red-500
                                    hover:!bg-red-600
                                    !border-0
                                    !w-11
                                    !h-11
                                    !rounded-xl"/>

                        </div>

                    </p:column>

                </p:dataTable>

            </div>

        </h:form>

    </ui:define>

</ui:composition>
