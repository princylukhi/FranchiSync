<!DOCTYPE html>

<ui:composition
    template="/templates/layout.xhtml"

    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="jakarta.faces.html"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:f="jakarta.faces.core"
    xmlns:p="http://primefaces.org/ui">

    <ui:define name="content">

        <h:form id="productForm"
                enctype="multipart/form-data">

            <!-- ================= HEADER ================= -->


            <div class="bg-white
            rounded-3xl
            shadow-md
            border border-slate-200
            p-6
            mb-8">

    <div class="flex
                items-center
                justify-between
                flex-wrap
                gap-6">

        <!-- LEFT -->
        <div class="flex items-center gap-5">

            <!-- ICON -->
            <div class="w-16
                        h-16
                        rounded-2xl
                        bg-emerald-500
                        flex
                        items-center
                        justify-center
                        shadow-lg">

                <i class="pi pi-box text-white text-2xl"></i>

            </div>

            <!-- TEXT -->
            <div>

                <h1 class="text-4xl
                           font-black
                           text-slate-800">

                    Products

                </h1>

                <p class="text-slate-500 mt-1">

                    Manage your company product catalog

                </p>

                <!-- COUNT -->
                <div class="mt-3
                            inline-flex
                            items-center
                            gap-2
                            bg-emerald-50
                            text-emerald-700
                            px-4
                            py-2
                            rounded-xl
                            font-semibold
                            text-sm">

                    <i class="pi pi-box"></i>

                    #{companyProductBean.products.size()} Products

                </div>

            </div>

        </div>

        <!-- BUTTON -->
        <p:commandButton
            value="Add Product"
            icon="pi pi-plus"
            process="@this"
            action="#{companyProductBean.openAddDialog}"
            update=":productForm:dialogPanel"
            oncomplete="PF('productDialog').show()"
            styleClass="!bg-emerald-500
                        hover:!bg-emerald-600
                        !border-0
                        !rounded-2xl
                        !px-6
                        !py-3
                        !font-bold"/>
    </div>

</div>

            <!-- ================= EMPTY STATE ================= -->

            <ui:fragment rendered="#{empty companyProductBean.products}">

                <div class="bg-white
                            rounded-3xl
                            shadow-lg
                            p-12
                            text-center">

                    <i class="pi pi-box
                              text-7xl
                              text-slate-300"></i>

                    <h2 class="text-3xl
                               font-bold
                               text-slate-700
                               mt-5">

                        No Products Yet

                    </h2>

                    <p class="text-slate-500 mt-3">
                        Start adding your company products.
                    </p>

                </div>

            </ui:fragment>

            <!-- ================= PRODUCT GRID ================= -->

            <div class="grid
                        grid-cols-1
                        md:grid-cols-2
                        xl:grid-cols-3
                        gap-5">

                <ui:repeat
                    value="#{companyProductBean.products}"
                    var="p">

                    <!-- CARD -->
                    <div class="bg-white
                                rounded-3xl
                                overflow-hidden
                                shadow-md
                                hover:shadow-2xl
                                transition-all
                                duration-300
                                border border-slate-100">

                        <!-- IMAGE -->
                        <div class="relative h-52 bg-slate-100">

                            <!-- PRODUCT IMAGE -->
                            <ui:fragment rendered="#{not empty p.image}">

                                <img src="#{request.contextPath}/product-images/#{p.image}"
                                     class="w-full
                                            h-full
                                            object-cover"/>

                            </ui:fragment>

                            <!-- NO IMAGE -->
                            <ui:fragment rendered="#{empty p.image}">

                                <div class="w-full
                                            h-full
                                            flex
                                            items-center
                                            justify-center">

                                    <i class="pi pi-image
                                              text-6xl
                                              text-slate-300"></i>

                                </div>

                            </ui:fragment>

                            <!-- STATUS BADGE -->
                            <div class="absolute top-3 right-3">

                                <span class="#{p.isActive
                                                ? 'bg-emerald-500'
                                                : 'bg-red-500'}
                                               text-white
                                               text-xs
                                               font-bold
                                               px-3
                                               py-1
                                               rounded-full
                                               shadow">

                                    #{p.isActive ? 'ACTIVE' : 'INACTIVE'}

                                </span>

                            </div>

                        </div>

                        <!-- CONTENT -->
                        <div class="p-5">

                            <!-- NAME -->
                            <h2 class="text-2xl
                                       font-black
                                       text-slate-800">

                                #{p.productName}

                            </h2>

                            <!-- CATEGORY -->
                            <p class="text-slate-500
                                      mt-1
                                      text-sm">

                                #{p.category}

                            </p>

                            <!-- PRICE -->
                            <div class="mt-5">

                                <p class="text-slate-400 text-sm">
                                    Price
                                </p>

                                <h3 class="text-4xl
                                           font-black
                                           text-slate-900
                                           mt-1">

                                    ₹ #{p.price}

                                </h3>

                            </div>

                            <!-- BUTTONS -->
                            <div class="grid
                                        grid-cols-2
                                        gap-3
                                        mt-6">

                                <!-- EDIT -->
                                <p:commandButton
                                    value="Edit"
                                    icon="pi pi-pencil"
                                    process="@this"
                                    update=":productForm:dialogPanel"
                                    action="#{companyProductBean.edit(p)}"
                                    oncomplete="PF('productDialog').show()"
                                    styleClass="!bg-emerald-500
                                                hover:!bg-emerald-600
                                                !border-0
                                                !rounded-2xl
                                                !py-3
                                                !font-bold"/>

                                <!-- DEACTIVATE -->
                                <p:commandButton
                                    rendered="#{p.isActive}"
                                    value="Deactivate"
                                    icon="pi pi-times"
                                    process="@this"
                                    update="@form"
                                    action="#{companyProductBean.deactivate(p.pid)}"
                                    styleClass="!bg-slate-700
                                                hover:!bg-slate-800
                                                !border-0
                                                !rounded-2xl
                                                !py-3
                                                !font-bold"/>

                                <!-- ACTIVATE -->
                                <p:commandButton
                                    rendered="#{not p.isActive}"
                                    value="Activate"
                                    icon="pi pi-check"
                                    process="@this"
                                    update="@form"
                                    action="#{companyProductBean.activate(p.pid)}"
                                    styleClass="!bg-emerald-500
                                                hover:!bg-emerald-600
                                                !border-0
                                                !rounded-2xl
                                                !py-3
                                                !font-bold"/>

                            </div>

                        </div>

                    </div>
                </ui:repeat>

            </div>

            <!-- ================= DIALOG ================= -->

            <p:dialog
                header="Product Details"
                widgetVar="productDialog"
                modal="true"
                responsive="true"
                width="550"
                closable="true"
                draggable="false"
                resizable="false"
                styleClass="rounded-3xl overflow-hidden">

                <h:panelGroup id="dialogPanel">

                    <div class="grid
                                grid-cols-1
                                gap-5
                                p-3">

                        <!-- NAME -->
                        <div>

                            <label class="block
                                         text-slate-700
                                         font-semibold
                                         mb-2">

                                Product Name

                            </label>

                            <p:inputText
                                value="#{companyProductBean.product.productName}"
                                required="true"
                                styleClass="w-full"/>

                        </div>

                        <!-- CATEGORY -->
                        <div>

                            <label class="block
                                         text-slate-700
                                         font-semibold
                                         mb-2">

                                Category

                            </label>

                            <p:selectOneMenu
                            value="#{companyProductBean.product.category}"
                            styleClass="w-full">

                            <p:ajax
                                process="@this"
                                update="otherCategoryWrapper"/>

                            <f:selectItem
                                itemLabel="Select Category"
                                itemValue=""/>

                            <f:selectItems
                                value="#{companyProductBean.categories}"/>

                        </p:selectOneMenu>

                                      <h:panelGroup id="otherCategoryWrapper">

                            <h:panelGroup
                                rendered="#{companyProductBean.product.category eq 'Other'}">

                                <div class="mt-4">

                                    <p:inputText
                                        value="#{companyProductBean.customCategory}"
                                        placeholder="Enter Product Category"
                                        styleClass="w-full"/>

                                </div>

                            </h:panelGroup>

                        </h:panelGroup>              
                               

                        </div>

                        <!-- PRICE -->
                        <div>

                            <label class="block
                                         text-slate-700
                                         font-semibold
                                         mb-2">

                                Price

                            </label>

                            <p:inputText
                                value="#{companyProductBean.product.price}"
                                required="true"
                                styleClass="w-full"/>

                        </div>

                        <!-- IMAGE -->
                        <div>

                            <label class="block
                                         text-slate-700
                                         font-semibold
                                         mb-2">

                                Product Image

                            </label>

                            <p:fileUpload
                                value="#{companyProductBean.uploadedFile}"
                                mode="simple"
                                skinSimple="true"
                                accept="image/*"/>

                        </div>

                    </div>

                    <!-- BUTTONS -->
                    <div class="flex
                                justify-start
                                gap-3
                                pt-6">

                        <!-- SAVE -->
                        <p:commandButton
                            value="Save Product"
                            rendered="#{companyProductBean.product.pid == null}"
                            action="#{companyProductBean.addProduct}"
                            update="@form"
                            process="@form"
                            icon="pi pi-check"
                            oncomplete="PF('productDialog').hide()"
                            styleClass="!bg-emerald-500
                                        hover:!bg-emerald-600
                                        !border-0
                                        !rounded-2xl
                                        hover:scale-105
                                        transition-all
                                        duration-300
                                        !px-5
                                        !py-3
                                        !font-bold"/>

                        <!-- UPDATE -->
                        <p:commandButton
                            value="Update Product"
                            rendered="#{companyProductBean.product.pid != null}"
                            action="#{companyProductBean.updateProduct}"
                            update="@form"
                            process="@form"
                            icon="pi pi-pencil"
                            oncomplete="PF('productDialog').hide()"
                            styleClass="!bg-blue-500
                                        hover:!bg-blue-600
                                        !border-0
                                        !rounded-2xl
                                        hover:scale-105
                                        transition-all
                                        duration-300
                                        !px-5
                                        !py-3
                                        !font-bold"/>

                    </div>

                </h:panelGroup>

            </p:dialog>

        </h:form>

    </ui:define>

</ui:composition>
