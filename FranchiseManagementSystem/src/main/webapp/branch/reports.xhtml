<?xml version='1.0' encoding='UTF-8' ?>

<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets">

<h:body>

<ui:composition template="/templates/layout.xhtml">

<ui:define name="content">

<!-- PAGE HEADER -->

<div class="mb-8">

    <h1 class="text-4xl font-bold text-slate-900">
        Branch Reports
    </h1>

    <p class="text-slate-500 mt-2 text-lg">
        Staff analytics and branch performance.
    </p>

</div>

<!-- FIRST ROW -->

<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

    <!-- STAFF PERFORMANCE -->

    <div class="bg-white rounded-3xl shadow-lg border border-slate-100 p-8">

        <h2 class="text-2xl font-bold mb-6">
            Staff Joining Trend
        </h2>

        <div style="height:350px">

            <canvas id="joiningChart"></canvas>

        </div>

    </div>

    <!-- STAFF RATINGS -->

    <div class="bg-white rounded-3xl shadow-lg border border-slate-100 p-8">

        <h2 class="text-2xl font-bold mb-6">
          Staff Status Distribution
        </h2>

        <div style="height:350px">

            <canvas id="statusChart"></canvas>

        </div>

    </div>

</div>

<!-- FEEDBACK TREND -->

<div class="bg-white rounded-3xl shadow-lg border border-slate-100 p-8 mt-8">

    <h2 class="text-2xl font-bold mb-6">
        Monthly Feedback Trend
    </h2>

    <div style="height:420px">

        <canvas id="trendChart"></canvas>

    </div>

</div>

<!-- CHART JS -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

document.addEventListener(
    "DOMContentLoaded",
    function () {

        // =====================================
        // STAFF PERFORMANCE
        // =====================================

        new Chart(

    document.getElementById("joiningChart"),

    {

        type: "line",

        data: {

            labels: [

                #{branchReportBean.joiningLabels}

            ],

            datasets: [

                {

                    label: "Staff Joined",

                    data: [

                        #{branchReportBean.joiningData}

                    ],

                    borderColor: "#10B981",

                    backgroundColor:
                        "rgba(16,185,129,0.15)",

                    fill: true,

                    tension: 0.4

                }

            ]

        }

    }

);

        // =====================================
        // STAFF RATINGS (RADAR)
        // =====================================

     new Chart(

    document.getElementById("statusChart"),

    {

        type: "doughnut",

        data: {

            labels: [

                #{branchReportBean.statusLabels}

            ],

            datasets: [

                {

                    data: [

                        #{branchReportBean.statusData}

                    ],

                    backgroundColor: [

                        "#10B981",
                        "#64748B"

                    ]

                }

            ]

        }

    }

);
        // =====================================
        // FEEDBACK TREND
        // =====================================

        new Chart(

            document.getElementById("trendChart"),

            {

                type: "line",

                data: {

                    labels: [

                        #{branchReportBean.trendLabels}

                    ],

                    datasets: [

                        {

                            label: "Feedbacks",

                            data: [

                                #{branchReportBean.trendData}

                            ],

                            borderColor:
                                "#1E293B",

                            backgroundColor:
                                "rgba(30,41,59,0.10)",

                            fill: true,

                            tension: 0.4

                        }

                    ]

                },

                options: {

                    responsive: true,

                    maintainAspectRatio: false,

                    plugins: {

                        legend: {

                            position: "bottom"

                        }

                    }

                }

            }

        );

    }

);

</script>

</ui:define>

</ui:composition>

</h:body>

</html>
