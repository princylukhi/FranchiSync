<!DOCTYPE html>

<ui:composition
    template="/templates/layout.xhtml"

    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="jakarta.faces.html"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:p="http://primefaces.org/ui"
    xmlns:f="jakarta.faces.core">

    <ui:define name="content">

        <h:form id="staffForm">

            <!-- HEADER -->

            <div class="bg-white
                        rounded-3xl
                        shadow-md
                        border border-slate-200
                        p-6
                        mb-8">

                <div class="flex
                            items-center
                            justify-between
                            flex-wrap
                            gap-6">

                    <!-- LEFT -->

                    <div class="flex items-center gap-5">

                        <!-- ICON -->

                        <div class="w-16
                                    h-16
                                    rounded-2xl
                                    bg-emerald-500
                                    flex
                                    items-center
                                    justify-center
                                    shadow-lg">

                            <i class="pi pi-users text-white text-2xl"></i>

                        </div>

                        <!-- TEXT -->

                        <div>

                            <h1 class="text-4xl
                                       font-black
                                       text-slate-800">

                                Staff Members

                            </h1>

                            <p class="text-slate-500 mt-1">

                                Manage branch staff members

                            </p>

                            <!-- COUNT -->

                            <div class="mt-3
                                        inline-flex
                                        items-center
                                        gap-2
                                        bg-emerald-50
                                        text-emerald-700
                                        px-4
                                        py-2
                                        rounded-xl
                                        font-semibold
                                        text-sm">

                                <i class="pi pi-users"></i>

                                #{branchStaffBean.staffList.size()}
                                Staff Members

                            </div>

                        </div>

                    </div>

                    <!-- BUTTON -->

                    <p:commandButton
                        value="Add Staff"
                        icon="pi pi-plus"
                        process="@this"
                        action="#{branchStaffBean.openAddDialog}"
                        update="staffForm:dialogPanel"
                        oncomplete="PF('staffDialog').show()"
                        styleClass="!bg-emerald-500
                                    hover:!bg-emerald-600
                                    !border-0
                                    !rounded-2xl
                                    !px-6
                                    !py-3
                                    !font-bold"/>

                </div>

            </div>

            <!-- TABLE -->

            <div class="bg-white
                        rounded-3xl
                        shadow-md
                        border border-slate-100
                        p-5">

                    <p:dataTable
                        value="#{branchStaffBean.staffList}"
                        var="s"
                        emptyMessage="No staff found"
                        scrollable="true"
                        scrollWidth="100%"
                        tableStyle="min-width:1300px"
                        styleClass="rounded-2xl overflow-hidden">

                        <!-- NAME -->

                        <p:column
                            headerText="Name"
                            style="width:14%">

                            <h:outputText
                                value="#{s.name}" />

                        </p:column>

                        <!-- EMAIL -->

                        <p:column
                            headerText="Email"
                            style="width:24%">

                            <h:outputText
                                value="#{s.email}"
                                style="word-break:break-word;" />

                        </p:column>

                        <!-- PHONE -->

                        <p:column
                            headerText="Phone"
                            style="width:14%">

                            <h:outputText
                                value="#{s.phone}" />

                        </p:column>

                        <!-- DESIGNATION -->

                        <p:column
                            headerText="Designation"
                            style="width:16%">

                            <h:outputText
                                value="#{s.designation}" />

                        </p:column>
                        
                        <!-- JOINING DATE -->

                        <p:column
                            headerText="Joining Date"
                            style="width:14%">

                            <h:outputText
                                value="#{s.joiningDate}">

                                <f:convertDateTime
                                    pattern="dd MMM yyyy"/>

                            </h:outputText>

                        </p:column>

                        <!-- STATUS -->

                        <p:column
                            headerText="Status"
                            style="width:8%">

                            <span class="#{s.status eq 'ACTIVE'
                                            ? 'bg-emerald-100 text-emerald-700'
                                            : 'bg-red-100 text-red-700'}
                                           px-3 py-1
                                           rounded-full
                                           text-xs
                                           font-bold">

                                #{s.status}

                            </span>

                        </p:column>

                        <!-- ACTIONS -->

                        <p:column
                            headerText="Actions"
                            style="width:10%">

                            <div class="flex gap-2">

                                <!-- EDIT -->

                                <p:commandButton
                                    icon="pi pi-pencil"
                                    process="@this"
                                    update="staffForm:dialogPanel"
                                    actionListener="#{branchStaffBean.edit(s)}"
                                    oncomplete="PF('staffDialog').show()"
                                    styleClass="!bg-blue-500
                                                hover:!bg-blue-600
                                                !border-0
                                                !rounded-xl"/>

                                <!-- DEACTIVATE -->

                                <p:commandButton
                                    rendered="#{s.status eq 'ACTIVE'}"
                                    icon="pi pi-times"
                                    process="@this"
                                    update="@form"
                                    actionListener="#{branchStaffBean.deactivate(s.uid)}"
                                    styleClass="!bg-slate-700
                                                hover:!bg-slate-800
                                                !border-0
                                                !rounded-xl"/>

                                <!-- ACTIVATE -->

                                <p:commandButton
                                    rendered="#{s.status eq 'INACTIVE'}"
                                    icon="pi pi-check"
                                    process="@this"
                                    update="@form"
                                    actionListener="#{branchStaffBean.activate(s.uid)}"
                                    styleClass="!bg-emerald-500
                                                hover:!bg-emerald-600
                                                !border-0
                                                !rounded-xl"/>

                            </div>

                        </p:column>

                    </p:dataTable>

            </div>

            <!-- DIALOG -->

            <p:dialog
                header="Staff Details"
                widgetVar="staffDialog"
                modal="true"
                responsive="true"
                width="500"
                closable="true"
                draggable="false"
                resizable="false">

                <h:panelGroup id="dialogPanel">

                    <div class="grid
                                grid-cols-1
                                gap-3
                                p-3">

                        <!-- NAME -->

                        <div>

                            <label class="block
                                         text-slate-700
                                         font-semibold
                                         mb-2">

                                Staff Name

                            </label>

                            <p:inputText
                                value="#{branchStaffBean.staff.name}"
                                required="true"
                                styleClass="w-full"/>

                        </div>

                        <!-- EMAIL -->

                        <div>

                            <label class="block
                                         text-slate-700
                                         font-semibold
                                         mb-2">

                                Email

                            </label>

                            <p:inputText
                                value="#{branchStaffBean.staff.email}"
                                required="true"
                                styleClass="w-full"/>

                        </div>

                        <!-- PHONE -->

                        <div>

                            <label class="block
                                         text-slate-700
                                         font-semibold
                                         mb-2">

                                Phone

                            </label>

                            <p:inputText
                                value="#{branchStaffBean.staff.phone}"
                                styleClass="w-full"/>

                        </div>

                    
                    <!-- DESIGNATION -->

                    <div>

                        <label class="block
                                     text-slate-700
                                     font-semibold
                                     mb-2">

                            Designation

                        </label>

                        <p:inputText
                            value="#{branchStaffBean.staff.designation}"
                            styleClass="w-full"/>

                    </div>
                    
                    <!-- JOINING DATE -->

                        <div>

                            <label class="block
                                         text-slate-700
                                         font-semibold
                                         mb-2">

                                Joining Date

                            </label>

                            <p:datePicker
                                value="#{branchStaffBean.staff.joiningDate}"
                                pattern="dd/MM/yyyy"
                                showIcon="true"
                                styleClass="w-full"/>

                        </div>
                 </div>


                    <!-- BUTTONS -->

                    <div class="flex gap-3 pt-6">

                        <!-- SAVE -->

                        <p:commandButton
                            value="Save Staff"
                            rendered="#{branchStaffBean.staff.uid == null}"
                            action="#{branchStaffBean.addStaff}"
                            update="@form"
                            process="@form"
                            icon="pi pi-check"
                            oncomplete="if(!args.validationFailed) PF('staffDialog').hide()"
                            styleClass="!bg-emerald-500
                                        hover:!bg-emerald-600
                                        !border-0
                                        !rounded-2xl
                                        !px-5
                                        !py-3
                                        !font-bold"/>

                        <!-- UPDATE -->

                        <p:commandButton
                            value="Update Staff"
                            rendered="#{branchStaffBean.staff.uid != null}"
                            action="#{branchStaffBean.updateStaff}"
                            update="@form"
                            process="@form"
                            icon="pi pi-pencil"
                            oncomplete="PF('staffDialog').hide()"
                            styleClass="!bg-blue-500
                                        hover:!bg-blue-600
                                        !border-0
                                        !rounded-2xl
                                        !px-5
                                        !py-3
                                        !font-bold"/>

                    </div>

                </h:panelGroup>

            </p:dialog>

        </h:form>

    </ui:define>

</ui:composition>
