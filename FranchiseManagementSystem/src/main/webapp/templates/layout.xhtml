<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">

<h:head>

    <title>FranchiSync</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- PrimeIcons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/primeicons/7.0.0/primeicons.min.css"/>

</h:head>

<h:body class="bg-stone-100">

    <!-- MAIN APP -->
    <div class="min-h-screen flex flex-col">

        <!-- NAVBAR -->
        <ui:include src="/templates/navbar.xhtml"/>

        <!-- BODY -->
        <div class="flex flex-1">

            <!-- SIDEBAR -->
            <aside class="w-72 bg-zinc-950 text-white shadow-2xl">

                <ui:include src="#{loginBean.sidebarPage}" />

            </aside>

            <!-- PAGE CONTENT -->
            <main class="flex-1 p-8 overflow-y-auto">

                <ui:insert name="content"/>

            </main>

        </div>

    </div>

</h:body>
</html>
