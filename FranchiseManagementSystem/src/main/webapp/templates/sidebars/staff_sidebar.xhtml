<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">

<h:body>

    <div class="h-full flex flex-col bg-zinc-950">

        <!-- TITLE -->
        <div class="p-6 border-b border-zinc-800">

            <h2 class="text-xl font-bold text-white">
                Staff Panel
            </h2>

            <p class="text-slate-400 text-sm mt-1">
                Staff Operations
            </p>

        </div>

        <!-- MENU -->
        <div class="flex-1 p-4 space-y-2">

            <!-- Dashboard -->
            <h:link outcome="/staff/dashboard.xhtml"
                    styleClass="flex items-center gap-3 px-4 py-3 rounded-xl bg-emerald-500 text-white font-medium shadow-lg">

                <i class="pi pi-home"></i>

                <span>Dashboard</span>

            </h:link>

            <!-- Billing -->
            <h:link outcome="/staff/billing.xhtml"
                    styleClass="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-zinc-800 hover:text-white transition-all duration-200">

                <i class="pi pi-shopping-cart"></i>

                <span>Billing</span>

            </h:link>

            <!-- Invoices -->
            <h:link outcome="/staff/invoices.xhtml"
                    styleClass="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-zinc-800 hover:text-white transition-all duration-200">

                <i class="pi pi-file"></i>

                <span>Invoices</span>

            </h:link>

            <!-- Sales History -->
            <h:link outcome="/staff/sales_history.xhtml"
                    styleClass="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-zinc-800 hover:text-white transition-all duration-200">

                <i class="pi pi-history"></i>

                <span>Sales History</span>

            </h:link>

        </div>

    </div>

</h:body>
</html>
