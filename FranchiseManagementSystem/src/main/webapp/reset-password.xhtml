<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>

    <title>Reset Password | FranchiSync</title>

    <script src="https://cdn.tailwindcss.com"></script>

</h:head>

<h:body class="min-h-screen
               bg-gradient-to-br
               from-emerald-50
               via-white
               to-slate-100">

    <div class="min-h-screen
                flex
                items-center
                justify-center
                px-6">

        <div class="w-full
                    max-w-lg
                    bg-white
                    rounded-[35px]
                    shadow-2xl
                    p-10">

            <h:panelGroup
                rendered="#{resetPasswordBean.validToken}">

                <div class="text-center mb-8">

                    <h2 class="text-3xl
                               font-black
                               text-slate-900">

                        Reset Password

                    </h2>

                    <p class="text-slate-500 mt-2">

                        Enter your new password.

                    </p>

                </div>

                <h:form>

                    <p:growl id="growl"
                             showDetail="true"/>

                    <div class="mb-4">

                        <label class="font-semibold">

                            New Password

                        </label>

                        <p:password
                            value="#{resetPasswordBean.password}"
                            required="true"
                            toggleMask="true"
                            styleClass="w-full"/>

                    </div>

                    <div class="mb-4">

                        <label class="font-semibold">

                            Confirm Password

                        </label>

                        <p:password
                            value="#{resetPasswordBean.confirmPassword}"
                            required="true"
                            toggleMask="true"
                            styleClass="w-full"/>

                    </div>

                    <p:commandButton

                        value="Reset Password"

                        action="#{resetPasswordBean.resetPassword()}"

                        update="growl"

                        styleClass="!w-full
                                    !bg-emerald-500
                                    !border-0
                                    !rounded-2xl
                                    !py-4"/>

                </h:form>

            </h:panelGroup>

            <h:panelGroup
                rendered="#{!resetPasswordBean.validToken}">

                <div class="text-center">

                    <h2 class="text-2xl
                               font-bold
                               text-red-600">

                        Invalid or Expired Link

                    </h2>

                    <p class="text-slate-500 mt-3">

                        This reset password link
                        has expired or is invalid.

                    </p>

                    <div class="mt-5">

                        <h:link
                            outcome="/forgot-password.xhtml"
                            value="Request New Link"
                            styleClass="text-emerald-600
                                        font-semibold"/>

                    </div>

                </div>

            </h:panelGroup>

        </div>

    </div>

</h:body>
</html>
