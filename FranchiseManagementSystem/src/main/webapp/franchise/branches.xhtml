<!DOCTYPE html>

<ui:composition
    template="/templates/layout.xhtml"

    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="jakarta.faces.html"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:p="http://primefaces.org/ui">

    <ui:define name="content">

        <h:form id="branchForm">

            <!-- HEADER -->

            <div class="bg-white
                        rounded-3xl
                        shadow-md
                        border border-slate-200
                        p-6
                        mb-8">

                <div class="flex
                            items-center
                            justify-between
                            flex-wrap
                            gap-6">

                    <!-- LEFT -->

                    <div class="flex items-center gap-5">

                        <!-- ICON -->

                        <div class="w-16
                                    h-16
                                    rounded-2xl
                                    bg-emerald-500
                                    flex
                                    items-center
                                    justify-center
                                    shadow-lg">

                            <i class="pi pi-building text-white text-2xl"></i>

                        </div>

                        <!-- TEXT -->

                        <div>

                            <h1 class="text-4xl
                                       font-black
                                       text-slate-800">

                                Branches

                            </h1>

                            <p class="text-slate-500 mt-1">

                                Manage your franchise branches

                            </p>

                            <!-- COUNT -->

                            <div class="mt-3
                                        inline-flex
                                        items-center
                                        gap-2
                                        bg-emerald-50
                                        text-emerald-700
                                        px-4
                                        py-2
                                        rounded-xl
                                        font-semibold
                                        text-sm">

                                <i class="pi pi-building"></i>

                                #{franchiseBranchBean.branches.size()}
                                Branches

                            </div>

                        </div>

                    </div>

                    <!-- BUTTON -->

                    <p:commandButton
                        value="Add Branch"
                        icon="pi pi-plus"
                        process="@this"
                        action="#{franchiseBranchBean.openAddDialog}"
                        update=":branchForm:dialogPanel"
                        oncomplete="PF('branchDialog').show()"
                        styleClass="!bg-emerald-500
                                    hover:!bg-emerald-600
                                    !border-0
                                    !rounded-2xl
                                    !px-6
                                    !py-3
                                    !font-bold"/>

                </div>

            </div>

            <!-- EMPTY -->

            <ui:fragment
                rendered="#{empty franchiseBranchBean.branches}">

                <div class="bg-white
                            rounded-3xl
                            shadow-lg
                            p-12
                            text-center">

                    <i class="pi pi-building
                              text-7xl
                              text-slate-300"></i>

                    <h2 class="text-3xl
                               font-bold
                               text-slate-700
                               mt-5">

                        No Branches Yet

                    </h2>

                    <p class="text-slate-500 mt-3">

                        Start adding your branches.

                    </p>

                </div>

            </ui:fragment>

            <!-- GRID -->

            <div class="grid
                        grid-cols-1
                        md:grid-cols-2
                        xl:grid-cols-3
                        gap-5">

                <ui:repeat
                    value="#{franchiseBranchBean.branches}"
                    var="b">

                    <!-- CARD -->

                    <div class="bg-white
                                rounded-3xl
                                shadow-md
                                border border-slate-100
                                p-6
                                flex
                                flex-col
                                h-full">

                        <!-- STATUS -->

                        <div class="flex justify-between items-start">

                        <div>

                            <h2 class="text-2xl
                                       font-black
                                       text-slate-800">

                                #{b.branchName}

                            </h2>

                            <!-- BRANCH CODE -->

                            <div class="mt-2">

                                <p class="text-slate-400 text-sm">
                                    Branch Code
                                </p>

                                <h3 class="text-lg
                                           font-semibold
                                           text-slate-700
                                           mt-1">

                                    #{b.branchCode}

                                </h3>

                            </div>

                        </div>

                        <span class="#{b.status eq 'ACTIVE'
                                        ? 'bg-emerald-100 text-emerald-700'
                                        : 'bg-red-100 text-red-700'}
                                       px-3 py-1
                                       rounded-full
                                       text-xs
                                       font-bold">

                            #{b.status}

                        </span>

                    </div>

                    
                        <!-- LOCATION -->

                        <div class="mt-5">

                            <p class="text-slate-400 text-sm">

                                Location

                            </p>

                            <h3 class="text-xl
                                       font-bold
                                       text-slate-700
                                       mt-1">

                                #{b.location}

                            </h3>

                        </div>
                        
                        <!-- ADDRESS -->

                        <div class="mt-4">

                            <p class="text-slate-400 text-sm">
                                Address
                            </p>

                            <p class="text-slate-700 mt-1">
                                #{b.address}
                            </p>

                        </div>


                                                <!-- CONTACT -->

                        <div class="mt-4">

                            <p class="text-slate-400 text-sm">
                                Contact Number
                            </p>

                            <p class="text-slate-700 mt-1">
                                #{b.contactNumber}
                            </p>

                        </div>

                       <div class="grid
                                    grid-cols-2
                                    gap-3
                                    mt-auto
                                    pt-6">

                            <!-- EDIT -->
                            <p:commandButton
                                value="Edit"
                                icon="pi pi-pencil"
                                process="@this"
                                update=":branchForm:dialogPanel"
                                actionListener="#{franchiseBranchBean.edit(b)}"
                                oncomplete="PF('branchDialog').show()"
                                styleClass="!bg-emerald-500
                                            hover:!bg-emerald-600
                                            !border-0
                                            !rounded-2xl
                                            !py-3
                                            !font-bold"/>

                            <!-- DEACTIVATE -->
                            <p:commandButton
                                rendered="#{b.status eq 'ACTIVE'}"
                                value="Deactivate"
                                icon="pi pi-times"
                                process="@this"
                                update="@form"
                                actionListener="#{franchiseBranchBean.deactivate(b.bid)}"
                                styleClass="!bg-slate-700
                                            hover:!bg-slate-800
                                            !border-0
                                            !rounded-2xl
                                            !py-3
                                            !font-bold"/>

                            <!-- ACTIVATE -->
                            <p:commandButton
                                rendered="#{b.status eq 'INACTIVE'}"
                                value="Activate"
                                icon="pi pi-check"
                                process="@this"
                                update="@form"
                                actionListener="#{franchiseBranchBean.activate(b.bid)}"
                                styleClass="!bg-emerald-500
                                            hover:!bg-emerald-600
                                            !border-0
                                            !rounded-2xl
                                            !py-3
                                            !font-bold"/>

                        </div>

                    </div>

                </ui:repeat>

            </div>

            <!-- DIALOG -->

            <p:dialog
                header="Branch Details"
                widgetVar="branchDialog"
                modal="true"
                responsive="true"
                width="500"
                closable="true"
                draggable="false"
                resizable="false">

                <h:panelGroup id="dialogPanel">

                    <div class="grid
                                grid-cols-1
                                gap-3
                                p-3">

                        <!-- NAME -->

                        <div>

                            <label class="block
                                         text-slate-700
                                         font-semibold
                                         mb-2">

                                Branch Name

                            </label>

                            <p:inputText
                                value="#{franchiseBranchBean.branch.branchName}"
                                required="true"
                                styleClass="w-full"/>

                        </div>
                        
                         <!-- BRANCH CODE -->

                        <div>

                            <label class="block
                                         text-slate-700
                                         font-semibold
                                         mb-2">

                                Branch Code

                            </label>

                            <p:inputText
                                value="#{franchiseBranchBean.branch.branchCode}"
                                styleClass="w-full"/>

                        </div>



                        <!-- LOCATION -->

                        <div>

                            <label class="block
                                         text-slate-700
                                         font-semibold
                                         mb-2">

                                Location

                            </label>

                            <p:inputText
                                value="#{franchiseBranchBean.branch.location}"
                                required="true"
                                styleClass="w-full"/>

                        </div>
                        
                        <!-- ADDRESS -->

                        <div>

                            <label class="block
                                         text-slate-700
                                         font-semibold
                                         mb-2">

                                Address

                            </label>

                            <p:inputTextarea
                                value="#{franchiseBranchBean.branch.address}"
                                rows="3"
                                autoResize="false"
                                styleClass="w-full"/>

                        </div>
                        
                        <!-- CONTACT NUMBER -->

                        <div>

                            <label class="block
                                         text-slate-700
                                         font-semibold
                                         mb-2">

                                Contact Number

                            </label>

                            <p:inputText
                                value="#{franchiseBranchBean.branch.contactNumber}"
                                styleClass="w-full"/>

                        </div>

                    </div>

                    <!-- BUTTONS -->

                    <div class="flex gap-3 pt-6">

                        <!-- SAVE -->

                        <p:commandButton
                            value="Save Branch"
                            rendered="#{franchiseBranchBean.branch.bid == null}"
                            action="#{franchiseBranchBean.addBranch}"
                            update="@form"
                            process="@form"
                            icon="pi pi-check"
                            oncomplete="PF('branchDialog').hide()"
                            styleClass="!bg-emerald-500
                                        hover:!bg-emerald-600
                                        !border-0
                                        !rounded-2xl
                                        !px-5
                                        !py-3
                                        !font-bold"/>

                        <!-- UPDATE -->

                        <p:commandButton
                            value="Update Branch"
                            rendered="#{franchiseBranchBean.branch.bid != null}"
                            action="#{franchiseBranchBean.updateBranch}"
                            update="@form"
                            process="@form"
                            icon="pi pi-pencil"
                            oncomplete="PF('branchDialog').hide()"
                            styleClass="!bg-blue-500
                                        hover:!bg-blue-600
                                        !border-0
                                        !rounded-2xl
                                        !px-5
                                        !py-3
                                        !font-bold"/>

                    </div>

                </h:panelGroup>

            </p:dialog>

        </h:form>

    </ui:define>

</ui:composition>
