<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>

    <title>Login | FranchiSync</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- PrimeIcons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/primeicons/7.0.0/primeicons.min.css"/>

</h:head>

<h:body class="min-h-screen bg-gradient-to-br from-emerald-50 via-white to-slate-100">

    <!-- BACK TO HOME -->
    <div class="px-8 py-5 flex items-center">

        <h:link outcome="/index.xhtml"
                styleClass="inline-flex items-center gap-2
                            text-slate-600 hover:text-emerald-600
                            font-semibold transition-all">

            <i class="pi pi-arrow-left"></i>

            <span>Back to Home</span>

        </h:link>

    </div>

    <!-- MAIN -->
    <div class="min-h-screen flex items-center justify-center px-6 py-10">

        <!-- CARD -->
        <div class="w-full max-w-lg
                    bg-white
                    rounded-[35px]
                    shadow-2xl
                    p-10">

            <!-- HEADER -->
            <div class="mb-8 text-center">

                <div class="flex justify-center mb-6">

                    <div class="w-20 h-20
                                rounded-3xl
                                bg-emerald-100
                                flex items-center
                                justify-center">

                        <i class="pi pi-building
                                  text-4xl
                                  text-emerald-600"></i>

                    </div>

                </div>

                <h2 class="text-4xl font-black text-slate-900 mb-3">
                    Login
                </h2>

                <p class="text-slate-500 text-lg">
                    Access your dashboard securely.
                </p>

            </div>

            <!-- FORM -->
            <h:form styleClass="space-y-5">

                <!-- MESSAGES -->
                <p:growl id="growl"
                         showDetail="true"
                         life="3000"/>

                <!-- EMAIL -->
                <div>

                    <label class="block text-slate-700
                                  font-semibold mb-2">

                        Email Address

                    </label>

                    <p:inputText
                        value="#{loginBean.email}"
                        required="true"
                        requiredMessage="Email is required"
                        placeholder="Enter Email Address"
                        styleClass="w-full !rounded-2xl
                        !py-4 !px-4 !border-slate-200
                        focus:!border-emerald-500
                        focus:!shadow-none"/>

                </div>

                <!-- PASSWORD -->
                <div>

                    <label class="block text-slate-700
                                  font-semibold mb-2">

                        Password

                    </label>

                    <p:password
                        value="#{loginBean.password}"
                        required="true"
                        requiredMessage="Password is required"
                        placeholder="Enter Password"
                        feedback="false"
                        toggleMask="true"
                        styleClass="w-full !rounded-2xl
                        !py-4 !px-4 !border-slate-200
                        focus:!border-emerald-500
                        focus:!shadow-none"/>

                </div>

                <!-- REMEMBER ME -->
                <div class="flex items-center justify-between">

                    <div class="flex items-center gap-2">

                        <p:selectBooleanCheckbox
                            value="#{loginBean.rememberMe}"/>

                        <span class="text-slate-600 text-sm">
                            Remember Me
                        </span>

                    </div>

                    <h:link outcome="/forgot-password.xhtml"
                            value="Forgot Password?"
                            styleClass="text-emerald-600
                            font-semibold hover:underline"/>

                </div>

                <!-- BUTTON -->
                <p:commandButton
                    value="Login"
                    action="#{loginBean.login()}"
                    process="@form"
                    update="growl"
                    ajax="false"
                    styleClass="!w-full !bg-emerald-500
                    hover:!bg-emerald-600
                    !border-0 !rounded-2xl
                    !py-4 !text-lg !font-semibold
                    !shadow-lg"/>

            </h:form>

            <!-- FOOTER -->
            <div class="mt-5 text-center space-y-2">

                <p class="text-slate-500 text-sm">

                    New company?

                    <h:link outcome="/company_register.xhtml"
                            value="Register here"
                            styleClass="text-emerald-600
                            font-semibold hover:underline"/>

                </p>

                <h:link outcome="/index.xhtml"
                        styleClass="inline-flex items-center gap-2
                        text-slate-500 hover:text-emerald-600
                        text-xs font-medium transition">

                    <i class="pi pi-arrow-left scale-75"></i>

                    <span>Back to Home</span>

                </h:link>

            </div>

        </div>

    </div>

</h:body>
</html>
