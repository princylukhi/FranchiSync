<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

<h:head>

    <title>Login | FranchiSync</title>

    <!-- CSS -->
    <h:outputStylesheet library="css" name="style.css"/>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"/>

    <!-- PrimeIcons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/primeicons/7.0.0/primeicons.min.css"/>

</h:head>

<h:body>

    <!-- LOGIN PAGE -->

    <div class="login-page">

        <div class="login-card">

            <!-- Logo -->

            <div class="login-logo">

                <i class="pi pi-building"></i>

                <h2>FranchiSync</h2>

                <p>Franchise Management System</p>

            </div>

            <!-- Messages -->

            <p:messages showDetail="true"
                        closable="true"/>

            <!-- Form -->

            <h:form>

                <!-- Email -->

                <div class="field">

                    <label>Email Address</label>

                    <p:inputText
                        value="#{loginBean.email}"
                        styleClass="w-100"
                        required="true"
                        requiredMessage="Email is required"/>

                </div>

                <!-- Password -->

                <div class="field mt-3">

                    <label>Password</label>

                    <p:password
                        value="#{loginBean.password}"
                        feedback="false"
                        toggleMask="true"
                        styleClass="w-100"
                        required="true"
                        requiredMessage="Password is required"/>

                </div>

                <!-- Remember -->

                <div class="mt-3">

                    <p:selectBooleanCheckbox/>

                    <span class="remember-text">
                        Remember Me
                    </span>

                </div>

                <!-- Button -->

                <div class="mt-4">

                    <p:commandButton
                        value="Login"
                        icon="pi pi-sign-in"
                        action="#{loginBean.login()}"
                        ajax="false"
                        styleClass="login-btn w-100"/>

                </div>

            </h:form>

            <!-- Footer -->

            <div class="login-footer">

                <span>
                    Don't have company access?
                </span>

                <h:link outcome="/company_register.xhtml"
                        value="Register Company"/>

            </div>

        </div>

    </div>

</h:body>
</html>
