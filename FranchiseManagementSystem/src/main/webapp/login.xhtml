<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>

    <title>Login | FranchiSync</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- PrimeIcons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/primeicons/7.0.0/primeicons.min.css"/>

</h:head>

<h:body class="min-h-screen bg-gradient-to-br from-emerald-50 via-white to-slate-100 overflow-x-hidden">

    <!-- MAIN CONTAINER -->
    <div class="min-h-screen flex items-center justify-center px-6 py-10">

        <!-- LOGIN CARD -->
        <div class="w-full max-w-6xl grid lg:grid-cols-2
                    bg-white/80 backdrop-blur-xl
                    rounded-[35px] shadow-2xl overflow-hidden">

            <!-- LEFT SIDE -->
            <div class="hidden lg:flex flex-col justify-center
                        bg-gradient-to-br from-emerald-500 to-emerald-600
                        text-white p-14 relative overflow-hidden">

                <!-- CIRCLE EFFECT -->
                <div class="absolute -top-16 -right-16 w-52 h-52
                            bg-white/10 rounded-full"></div>

                <div class="absolute bottom-0 -left-10 w-40 h-40
                            bg-white/10 rounded-full"></div>

                <!-- LOGO -->
                <div class="flex items-center gap-4 mb-10 z-10">

                    <div class="w-16 h-16 rounded-2xl
                                bg-white/20 backdrop-blur-md
                                flex items-center justify-center">

                        <i class="pi pi-building text-3xl"></i>

                    </div>

                    <div>

                        <h1 class="text-4xl font-black">
                            FranchiSync
                        </h1>

                        <p class="text-emerald-100">
                            Franchise Management System
                        </p>

                    </div>

                </div>

                <!-- TEXT -->
                <div class="z-10">

                    <h2 class="text-5xl font-black leading-tight mb-6">

                        Welcome
                        Back!

                    </h2>

                    <p class="text-emerald-50 text-lg leading-8">

                        Manage franchises, branches,
                        inventory, billing and operations
                        through one centralized platform.

                    </p>

                </div>

            </div>

            <!-- RIGHT SIDE -->
            <div class="relative p-10 lg:p-14 flex flex-col justify-center">

                <!-- MOBILE LOGO -->
                <div class="lg:hidden flex items-center gap-3 mb-10">

                    <div class="w-12 h-12 rounded-2xl
                                bg-emerald-500
                                flex items-center justify-center">

                        <i class="pi pi-building text-white text-xl"></i>
                        
                        

                    </div>

                    <div>

                        <h1 class="text-2xl font-black text-slate-900">
                            FranchiSync
                        </h1>

                        <p class="text-sm text-slate-500">
                            Franchise Management System
                        </p>

                    </div>
                    
                    

                </div>

                <!-- TITLE -->
                <div class="mb-10">

                    <h2 class="text-4xl font-black text-slate-900 mb-3">
                        Login
                    </h2>

                    <p class="text-slate-500 text-lg">
                        Access your dashboard securely.
                    </p>

                </div>

                <!-- FORM -->
                <h:form styleClass="space-y-6">

                    <!-- ERROR MESSAGE -->
                    <p:growl id="growl"
                    showDetail="true"
                    life="3000"/>

                    <!-- EMAIL -->
                    <div>

                        <label class="block text-slate-700 font-semibold mb-2">
                            Email Address
                        </label>

                        <div class="relative">

                            <i class="pi pi-envelope absolute
                                     left-4 top-1/2 -translate-y-1/2
                                     text-slate-400"></i>

                            <p:inputText
                                value="#{loginBean.email}"
                                required="true"
                                requiredMessage="Email is required"
                                placeholder="Enter your email"
                                styleClass="w-full !pl-12 !py-4
                                !rounded-2xl !border-slate-200
                                focus:!border-emerald-500
                                focus:!shadow-none"/>

                        </div>

                    </div>

                    <!-- PASSWORD -->
                    <div>

                        <label class="block text-slate-700 font-semibold mb-2">
                            Password
                        </label>

                        <div class="relative">

                            <i class="pi pi-lock absolute
                                     left-4 top-1/2 -translate-y-1/2
                                     text-slate-400 z-10"></i>

                            <p:password
                                value="#{loginBean.password}"
                                required="true"
                                requiredMessage="Password is required"
                                placeholder="Enter your password"
                                feedback="false"
                                toggleMask="true"
                                styleClass="w-full !pl-12 !py-4
                                !rounded-2xl !border-slate-200
                                focus:!border-emerald-500
                                focus:!shadow-none"/>

                        </div>

                    </div>

                    <!-- OPTIONS -->
                    <div class="flex items-center justify-between">

                        <div class="flex items-center gap-2">

                            <p:selectBooleanCheckbox
                                value="#{loginBean.rememberMe}"/>

                            <span class="text-slate-600 text-sm">
                                Remember me
                            </span>

                        </div>

                        <h:link
                        outcome="/forgot-password.xhtml"
                        value="Forgot Password?"
                        styleClass="text-emerald-600
                                    font-semibold
                                    text-sm
                                    hover:underline"/>

                    </div>

                    <!-- BUTTON -->
                    <p:commandButton
                        value="Login"
                        action="#{loginBean.login()}"
                        update="growl"
                        process="@form"
                        ajax="false"
                        styleClass="!w-full !bg-emerald-500
                        hover:!bg-emerald-600
                        !border-0 !rounded-2xl
                        !py-4 !text-lg !font-semibold
                        !shadow-lg"/>

                </h:form>

                <!-- FOOTER -->
                <div class="mt-5 text-center space-y-2">

                    <!-- REGISTER -->
                    <p class="text-slate-500 text-sm">

                        New company?

                        <h:link outcome="/company_register.xhtml"
                                value="Register here"
                                styleClass="text-emerald-600 font-semibold hover:underline"/>

                    </p>

                    <!-- BACK -->
                    <h:link outcome="/index.xhtml"
                            styleClass="inline-flex items-center gap-2
                            text-slate-500 hover:text-emerald-600
                            text-xs font-medium transition">

                        <i class="pi pi-arrow-left scale-75"></i>
                        
                        <span>Back to Home</span>

                    </h:link>

                </div>

            </div>

        </div>

    </div>

</h:body>
</html>
