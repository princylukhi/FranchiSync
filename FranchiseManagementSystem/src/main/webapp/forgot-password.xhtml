<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>

    <title>Forgot Password | FranchiSync</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/primeicons/7.0.0/primeicons.min.css"/>

</h:head>

<h:body class="min-h-screen
               bg-gradient-to-br
               from-emerald-50
               via-white
               to-slate-100">

    <div class="min-h-screen
                flex
                items-center
                justify-center
                px-6">

        <div class="w-full
                    max-w-lg
                    bg-white
                    rounded-[35px]
                    shadow-2xl
                    p-10">

            <div class="text-center mb-8">

                <div class="w-16 h-16
                            mx-auto
                            rounded-2xl
                            bg-emerald-500
                            flex
                            items-center
                            justify-center">

                    <i class="pi pi-lock-open
                              text-white
                              text-2xl"></i>

                </div>

                <h2 class="text-3xl
                           font-black
                           text-slate-900
                           mt-5">

                    Forgot Password

                </h2>

                <p class="text-slate-500 mt-2">

                    Enter your registered email address.

                </p>

            </div>

            <h:form>

                <p:growl id="growl"
                         showDetail="true"/>

                <div>

                    <label class="block
                                 text-slate-700
                                 font-semibold
                                 mb-2">

                        Email Address

                    </label>

                    <p:inputText
                        value="#{forgotPasswordBean.email}"
                        required="true"
                        requiredMessage="Email is required"
                        placeholder="Enter your email"
                        styleClass="w-full !py-4
                                    !rounded-2xl"/>

                </div>

                <p:commandButton

                    value="Send Reset Link"

                    action="#{forgotPasswordBean.sendResetLink()}"

                    update="growl"

                    styleClass="!w-full
                                !mt-6
                                !bg-emerald-500
                                hover:!bg-emerald-600
                                !border-0
                                !rounded-2xl
                                !py-4"/>

                <div class="text-center mt-5">

                    <h:link
                        outcome="/login.xhtml"
                        value="Back to Login"
                        styleClass="text-emerald-600
                                    font-semibold"/>

                </div>

            </h:form>

        </div>

    </div>

</h:body>
</html>
